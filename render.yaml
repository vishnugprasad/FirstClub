services:
  - type: web
    name: firstclub-membership-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /api/v1/plans
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: firstclub-membership-db
          property: connectionString

  - type: web
    name: firstclub-membership
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://firstclub-membership-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: firstclub-membership-db
    plan: free
    region: singapore
    postgresMajorVersion: "17"
    databaseName: firstclub
    user: firstclub
    ipAllowList: []
